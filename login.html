<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>裂金7日 · 登录注册</title>
  
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QQ6GQ79K7G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QQ6GQ79K7G');
  </script>
  
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="css/global-background.css">
  <link rel="stylesheet" href="css/login.css">
  
  <style>
    :root {
      /* 多主题系统变量 */
      --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --bg-secondary: rgba(255, 255, 255, 0.1);
      --bg-card: rgba(255, 255, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: #e0e6ed;
      --border-color: rgba(255, 255, 255, 0.2);
      --accent-color: #6dd5ed;
      --btn-gradient: linear-gradient(45deg, #667eea, #764ba2);
      --btn-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      --btn-glow: 0 0 20px rgba(109, 213, 237, 0.6);
      --logo-filter: drop-shadow(0 0 10px rgba(109, 213, 237, 0.8));
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- 背景装饰 -->
    <div class="bg-decoration"></div>
    
    <!-- 主要内容 -->
    <div class="login-content">
      <!-- Logo 区域 -->
      <div class="logo-section">
        <img src="图标文件/信封.svg" alt="裂金7日" class="logo">
        <h1 class="app-title">裂金7日</h1>
        <p class="app-subtitle">H5网页游戏化金融产品</p>
      </div>
      
      <!-- 登录表单 -->
      <div class="form-container" id="loginForm">
        <h2 class="form-title">登录账户</h2>
        
        <form class="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail" class="form-label">邮箱地址</label>
            <input 
              type="email" 
              id="loginEmail" 
              class="form-input" 
              placeholder="请输入您的邮箱地址"
              required
            >
          </div>
          
          <div class="form-group">
            <label for="loginPassword" class="form-label">密码</label>
            <input 
              type="password" 
              id="loginPassword" 
              class="form-input" 
              placeholder="请输入您的密码"
              required
            >
          </div>
          
          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe">
              <span class="checkmark"></span>
              记住我
            </label>
            <a href="#" class="forgot-link" onclick="showForgotPassword()">忘记密码？</a>
          </div>
          
          <button type="submit" class="submit-btn">
            <span class="btn-text">登录</span>
            <div class="btn-loading hidden">
              <div class="loading-spinner"></div>
            </div>
          </button>
        </form>
        
        <div class="form-footer">
          <p>还没有账户？ <a href="#" class="switch-link" onclick="showRegister()">立即注册</a></p>
        </div>
      </div>
      
      <!-- 注册表单 -->
      <div class="form-container hidden" id="registerForm">
        <h2 class="form-title">创建账户</h2>
        
        <form class="login-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="registerEmail" class="form-label">邮箱地址</label>
            <input 
              type="email" 
              id="registerEmail" 
              class="form-input" 
              placeholder="请输入您的邮箱地址"
              required
            >
          </div>
          
          <div class="form-group">
            <label for="registerPassword" class="form-label">密码</label>
            <input 
              type="password" 
              id="registerPassword" 
              class="form-input" 
              placeholder="请设置您的密码（至少8位）"
              minlength="8"
              required
            >
          </div>
          
          <div class="form-group">
            <label for="confirmPassword" class="form-label">确认密码</label>
            <input 
              type="password" 
              id="confirmPassword" 
              class="form-input" 
              placeholder="请再次输入密码"
              required
            >
          </div>
          
          <div class="form-group">
            <label for="inviteCode" class="form-label">邀请码（必填）</label>
            <input 
              type="text" 
              id="inviteCode" 
              class="form-input" 
              placeholder="请输入邀请码"
              required
            >
            <div class="form-hint">我们是团队结构游戏，不支持玩家独立注册</div>
          </div>
          
          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="agreeTerms" required>
              <span class="checkmark"></span>
              我同意 <a href="#" class="terms-link">用户协议</a> 和 <a href="#" class="privacy-link">隐私政策</a>
            </label>
          </div>
          
          <button type="submit" class="submit-btn">
            <span class="btn-text">注册</span>
            <div class="btn-loading hidden">
              <div class="loading-spinner"></div>
            </div>
          </button>
        </form>
        
        <div class="form-footer">
          <p>已有账户？ <a href="#" class="switch-link" onclick="showLogin()">立即登录</a></p>
        </div>
      </div>
      
      <!-- 忘记密码表单 -->
      <div class="form-container hidden" id="forgotForm">
        <h2 class="form-title">重置密码</h2>
        
        <div class="form-description">
          <p>请输入您注册时使用的邮箱地址，我们将向您发送密码重置链接。</p>
        </div>
        
        <form class="login-form" onsubmit="handleForgotPassword(event)">
          <div class="form-group">
            <label for="forgotEmail" class="form-label">邮箱地址</label>
            <input 
              type="email" 
              id="forgotEmail" 
              class="form-input" 
              placeholder="请输入您的邮箱地址"
              required
            >
          </div>
          
          <button type="submit" class="submit-btn">
            <span class="btn-text">发送重置链接</span>
            <div class="btn-loading hidden">
              <div class="loading-spinner"></div>
            </div>
          </button>
        </form>
        
        <div class="form-footer">
          <p><a href="#" class="switch-link" onclick="showLogin()">返回登录</a></p>
          <div class="form-hint">重置链接将在1小时后过期</div>
          <div class="form-hint">每15分钟最多可申请5次重置</div>
        </div>
      </div>
    </div>
    
    <!-- 底部信息 -->
    <div class="footer-info">
      <p>&copy; 2024 裂金7日. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">用户协议</a>
        <a href="#">隐私政策</a>
        <a href="#">帮助中心</a>
      </div>
    </div>
  </div>
  
  <!-- 通知组件 -->
  <div class="notification" id="notification">
    <div class="notification-content">
      <div class="notification-icon" id="notificationIcon">✓</div>
      <div class="notification-message" id="notificationMessage">操作成功</div>
    </div>
  </div>
  
  <!-- 引入脚本 -->
  <script src="js/login.js"></script>
</body>
</html>
